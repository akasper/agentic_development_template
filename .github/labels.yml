# Canonical PLATE labels. Apply with a label-sync tool or create manually.
# Labels are stable process metadata. Use GitHub Projects fields for frequently changing planning state.

- name: "Bug"
  color: "d73a4a"
  description: "Defect, regression, or incorrect behavior."
- name: "Feature"
  color: "0e8a16"
  description: "User-visible or system-visible capability tied to an epic."
- name: "Epic"
  color: "5319e7"
  description: "Large outcome that owns a dedicated Epic: short-name label."
- name: "Documentation"
  color: "0075ca"
  description: "Documentation-only pull request or documentation work."
- name: "Research"
  color: "fbca04"
  description: "Investigation, decision support, or option analysis."
- name: "Audit"
  color: "b60205"
  description: "Drift finding, process audit, or corrective follow-up."
- name: "Migration"
  color: "c2e0c6"
  description: "Migration task for adopting or upgrading PLATE artifacts."

- name: "area:product"
  color: "bfd4f2"
  description: "Product intent, requirements, or user outcome area."
- name: "area:frontend"
  color: "bfd4f2"
  description: "Frontend or user interface area."
- name: "area:backend"
  color: "bfd4f2"
  description: "Backend, API, data, or service area."
- name: "area:infra"
  color: "bfd4f2"
  description: "Infrastructure, deployment, CI, or operations area."
- name: "area:docs"
  color: "bfd4f2"
  description: "Documentation, wiki, release notes, or knowledge base area."
- name: "area:tests"
  color: "bfd4f2"
  description: "Testing, fixtures, QA, or verification area."
- name: "area:agent"
  color: "bfd4f2"
  description: "Agent behavior, skills, tools, or automation area."
- name: "area:security"
  color: "bfd4f2"
  description: "Security, permissions, secrets, or privacy area."
- name: "area:marketing"
  color: "bfd4f2"
  description: "Public claims, marketing site, launch, or positioning area."

- name: "risk:low"
  color: "c2e0c6"
  description: "Low-risk change with straightforward review."
- name: "risk:medium"
  color: "fbca04"
  description: "Moderate-risk change requiring careful review."
- name: "risk:high"
  color: "d93f0b"
  description: "High-risk change requiring explicit human attention."
- name: "risk:critical"
  color: "b60205"
  description: "Critical-risk change requiring heightened review and rollback planning."

- name: "need:reproduction"
  color: "fef2c0"
  description: "A bug report needs reproducible steps or evidence."
- name: "need:decision"
  color: "fef2c0"
  description: "A human decision is needed before work can proceed."
- name: "need:tests"
  color: "fef2c0"
  description: "Test coverage or verification evidence is needed."
- name: "need:docs"
  color: "fef2c0"
  description: "Documentation update is needed."
- name: "need:design"
  color: "fef2c0"
  description: "Design, UX, architecture, or product design input is needed."
- name: "need:security-review"
  color: "fef2c0"
  description: "Security review is needed."
- name: "need:human-review"
  color: "fef2c0"
  description: "Human review or judgment is needed."
- name: "need:wiki-sync"
  color: "fef2c0"
  description: "Wiki documentation needs to be created or updated."

- name: "priority:p0"
  color: "b60205"
  description: "Highest priority. Use a Project field instead when available."
- name: "priority:p1"
  color: "d93f0b"
  description: "High priority. Use a Project field instead when available."
- name: "priority:p2"
