name: Research
description: Structure investigation, comparison, or decision-preparation work.
title: "[Research]: "
labels:
  - Research
body:
  - type: textarea
    id: question
    attributes:
      label: Research question
      description: What question must be answered?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context and affected artifacts
      description: Link related SPEC sections, issues, PRs, ADRs, docs, workflows, or public claims.
    validations:
      required: true
  - type: textarea
    id: options
    attributes:
      label: Options to compare
      description: Identify alternatives, constraints, sources, or prototypes to evaluate.
    validations:
      required: true
  - type: textarea
    id: decision_criteria
    attributes:
      label: Decision criteria
      description: What evidence or tradeoffs will determine the recommendation?
    validations:
      required: true
  - type: textarea
    id: expected_output
    attributes:
      label: Expected output
      description: Specify whether this should produce an ADR, SPEC update, implementation issue, prototype, or recommendation.
    validations:
      required: true
