name: PLATES Auto-Address PR Feedback

# Fires when a third-party agent submits a PR review or leaves an inline
# comment. If the sender matches a known agent list, posts a structured
# @copilot invocation comment asking Copilot to address the feedback
# autonomously. Human intervention is only requested when an item requires
# judgment, credentials, or an architectural decision.
#
# REQUIRED SETUP: Create a repository secret named COPILOT_TRIGGER_PAT
# containing a fine-grained PAT (pull-requests: write) owned by a human
# GitHub account. Comments posted by github-actions[bot] are not routed to
# the Copilot Coding Agent by GitHub's notification system — only comments
# from human accounts reliably invoke @copilot. Without this secret the
# workflow falls back to github.token and logs a warning (the comment will
# appear but may not trigger a Copilot session).

on:
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  address-feedback:
    runs-on: ubuntu-latest
    concurrency:
      group: plates-feedback-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - name: Detect third-party agent feedback
        id: detect
        uses: actions/github-script@v7
        env:
          AGENT_LOGINS: ${{ vars.PLATE_PR_FEEDBACK_AGENTS }}
        with:
          script: |
            // PLATE_PR_FEEDBACK_AGENTS repo variable: comma-separated GitHub logins
            // of third-party agents whose feedback should trigger auto-addressing.
            // Falls back to well-known default patterns when the variable is not set.
            const configuredLogins = (process.env.AGENT_LOGINS || '')
              .split(',')
              .map((s) => s.trim().toLowerCase())
              .filter(Boolean);

            const DEFAULT_AGENT_PATTERNS = [
              /^devin/i,
              /^openhands/i,
              /^codegen/i,
              /^swe-agent/i,
              /^aide-agent/i,
              /^mentat-bot/i,
            ];

            const isKnownAgent = (login) => {
              const lower = login.toLowerCase();
              return configuredLogins.includes(lower) ||
                DEFAULT_AGENT_PATTERNS.some((pattern) => pattern.test(login));
            };

            let reviewer = null;
            let prNumber = null;
            let reviewState = null;
            let feedbackUrl = null;
            let isBatchReview = false;

            if (context.eventName === 'pull_request_review') {
              const review = context.payload.review;
              reviewer = review.user?.login;
              reviewState = (review.state || '').toLowerCase();
              feedbackUrl = review.html_url;
              prNumber = context.payload.pull_request.number;
              isBatchReview = true;

              // An "approved" review with no body is a rubber stamp — nothing to act on
              if (reviewState === 'approved' && !review.body?.trim()) {
                core.info(`Skipping approved review with no body from @${reviewer}.`);
                core.setOutput('should_post', 'false');
                return;
              }
            } else if (context.eventName === 'pull_request_review_comment') {
              const comment = context.payload.comment;
              reviewer = comment.user?.login;
              feedbackUrl = comment.html_url;
              prNumber = context.payload.pull_request.number;
              reviewState = 'commented';
              isBatchReview = false;
            }

            if (!reviewer || !prNumber) {
              core.info('Unable to determine reviewer or PR number; skipping.');
              core.setOutput('should_post', 'false');
              return;
            }

            if (!isKnownAgent(reviewer)) {
              core.info(`@${reviewer} is not a known third-party agent; skipping.`);
              core.setOutput('should_post', 'false');
              return;
            }

            core.info(`Detected feedback from known agent @${reviewer} on PR #${prNumber} (state: ${reviewState}, batch: ${isBatchReview}).`);

            // Deduplication: avoid posting multiple trigger comments within a short
            // window (e.g., when a review fires multiple comment events in quick
            // succession, or when the workflow re-triggers due to PR sync).
            const MARKER = `<!-- plates-feedback-trigger:${reviewer} -->`;
            const COOLDOWN_MS = 10 * 60 * 1000; // 10 minutes

            const allComments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const recentTriggers = allComments.filter(
              (c) => c.user?.type === 'Bot' && c.body?.includes(MARKER)
            );
            const latestTriggerAt = recentTriggers.length > 0
              ? new Date(recentTriggers[recentTriggers.length - 1].created_at).getTime()
              : 0;

            if (Date.now() - latestTriggerAt < COOLDOWN_MS) {
              core.info(`Trigger comment already posted within cooldown window for @${reviewer} on PR #${prNumber}; skipping.`);
              core.setOutput('should_post', 'false');
              return;
            }

            const stateLabel = {
              changes_requested: '🔴 changes requested',
              commented: '💬 feedback',
              approved: '✅ approved with notes',
            }[reviewState] || reviewState;

            core.setOutput('should_post', 'true');
            core.setOutput('reviewer', reviewer);
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('feedback_url', feedbackUrl);
            core.setOutput('state_label', stateLabel);
            core.setOutput('marker', MARKER);

      - name: Warn if COPILOT_TRIGGER_PAT is not configured
        if: steps.detect.outputs.should_post == 'true'
        shell: bash
        run: |
          if [ -z "$TRIGGER_PAT" ]; then
            echo "::warning file=.github/workflows/plates-address-pr-feedback.yml::COPILOT_TRIGGER_PAT secret is not set. The @copilot mention will be posted by github-actions[bot], which GitHub does not route to the Copilot Coding Agent. Create a fine-grained PAT (pull-requests: write) owned by a human account and store it as the COPILOT_TRIGGER_PAT repository secret to enable reliable Copilot invocation."
          fi
        env:
          TRIGGER_PAT: ${{ secrets.COPILOT_TRIGGER_PAT }}

      - name: Post @copilot trigger comment
        if: steps.detect.outputs.should_post == 'true'
        uses: actions/github-script@v7
        env:
          REVIEWER: ${{ steps.detect.outputs.reviewer }}
          PR_NUMBER: ${{ steps.detect.outputs.pr_number }}
          FEEDBACK_URL: ${{ steps.detect.outputs.feedback_url }}
          STATE_LABEL: ${{ steps.detect.outputs.state_label }}
          TRIGGER_MARKER: ${{ steps.detect.outputs.marker }}
        with:
          github-token: ${{ secrets.COPILOT_TRIGGER_PAT || github.token }}
          script: |
            const reviewer = process.env.REVIEWER;
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const feedbackUrl = process.env.FEEDBACK_URL;
            const stateLabel = process.env.STATE_LABEL;
            const MARKER = process.env.TRIGGER_MARKER;

            const body = [
              MARKER,
              `### PLATES: PR feedback from @${reviewer} (${stateLabel})`,
              '',
              `@copilot — @${reviewer} has left feedback on this PR. Per the PLATE autopilot doctrine, please address it autonomously:`,
              '',
              '1. Review all open inline comments and the overall review body from @' + reviewer,
              '2. For any comment that includes a GitHub code suggestion (` ```suggestion ` block): apply it directly as a commit **unless** the suggestion introduces a bug or relies on a false assumption — if you skip a suggestion, reply to that thread explaining why',
              '3. For all other actionable comments: make the necessary code change or reply explaining why no change is needed',
              '4. After addressing each comment (via code change, applied suggestion, or explanatory reply), resolve its review thread using the GitHub GraphQL `resolveReviewThread` mutation',
              '5. If any item requires human judgment (API keys, architectural decisions, security changes, credential handling), add the `need:human-review` label to this PR and leave a comment identifying exactly what requires human input',
              '6. Push any resulting code changes and re-request review when complete',
              '',
              `Feedback thread: ${feedbackUrl}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

            core.info(`@copilot trigger comment posted on PR #${prNumber}.`);
