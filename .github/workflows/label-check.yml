name: PLATE Label Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]
  issues:
    types: [opened, edited, labeled, unlabeled, reopened]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  check-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PLATE label rules
        uses: actions/github-script@v7
        with:
          script: |
            const issueTypeLabels = ['Bug', 'Feature', 'Epic', 'Research', 'Design', 'Question', 'Audit', 'Migration'];
            const prTypeLabels = ['Bug', 'Feature', 'Documentation'];
            const target = context.payload.pull_request || context.payload.issue;
            const isPullRequest = Boolean(context.payload.pull_request);

            if (!target) {
              core.info('No issue or pull request payload found.');
              return;
            }

            const labels = (target.labels || []).map((label) => typeof label === 'string' ? label : label.name);
            const epicLabels = labels.filter((label) => /^Epic: .+/.test(label));
            const forbiddenPlanningLabels = labels.filter((label) => /^status:|^priority:/.test(label));
            core.info(`Labels: ${labels.join(', ') || '(none)'}`);

            if (forbiddenPlanningLabels.length > 0) {
              core.setFailed(`PLATE template repositories should use GitHub Projects fields for planning state, not labels: ${forbiddenPlanningLabels.join(', ')}.`);
              return;
            }

            if (isPullRequest) {
              const matches = labels.filter((label) => prTypeLabels.includes(label));
              if (matches.length !== 1) {
                core.setFailed(`Pull requests must have exactly one PLATE PR type label: ${prTypeLabels.join(', ')}. Found: ${matches.join(', ') || '(none)'}.`);
                return;
              }
              return;
            }

            const matches = labels.filter((label) => issueTypeLabels.includes(label));
            if (matches.length !== 1) {
              core.setFailed(`Issues must have exactly one PLATE issue type label: ${issueTypeLabels.join(', ')}. Found: ${matches.join(', ') || '(none)'}.`);
              return;
            }

            if (matches[0] === 'Feature' && epicLabels.length !== 1) {
              core.setFailed(`Feature issues must carry exactly one Epic: short-name label. Found: ${epicLabels.join(', ') || '(none)'}.`);
              return;
            }

            if (matches[0] === 'Epic' && epicLabels.length !== 1) {
              core.setFailed(`Epic issues must carry exactly one dedicated Epic: short-name label. Found: ${epicLabels.join(', ') || '(none)'}.`);
              return;
            }

            core.info('PLATE label rules passed.');
