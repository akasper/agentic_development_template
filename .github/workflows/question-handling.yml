name: Question Handling

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  batch-open-questions:
    if: github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    steps:
      - name: Handle /question-batch slash command
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment?.body || '';
            const match = body.trim().match(/^\/question-batch(?:\s+(\d+))?$/i);
            if (!match) {
              core.info('Comment is not /question-batch; skipping.');
              return;
            }

            const requested = parseInt(match[1] || '10', 10);
            const limit = Number.isFinite(requested) ? Math.min(Math.max(requested, 1), 30) : 10;

            const [questionIssues, hashQuestionIssues] = await Promise.all([
              github.paginate(github.rest.issues.listForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'Question',
                per_page: 100
              }),
              github.paginate(github.rest.issues.listForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: '#question',
                per_page: 100
              })
            ]);

            const merged = [...questionIssues, ...hashQuestionIssues]
              .filter((item) => !item.pull_request)
              .reduce((map, item) => map.set(item.number, item), new Map());

            const openQuestions = [...merged.values()]
              .sort((a, b) => new Date(a.created_at) - new Date(b.created_at))
              .slice(0, limit);

            const rows = openQuestions.length > 0
              ? openQuestions.map((issue) => `| #${issue.number} | ${issue.title.replace(/\|/g, '\\|')} | @${issue.user.login} |`).join('\n')
              : '| — | No open Question issues found. | — |';

            const message = [
              `### Open Question batch (${openQuestions.length})`,
              '',
              '| Issue | Title | Author |',
              '|---|---|---|',
              rows,
              '',
              'Low-friction GitHub CLI follow-up:',
              '```bash',
              'gh issue list --state open --label "Question" --limit 30',
              'gh issue view <number>',
              'gh issue comment <number> --body "Answer: <summary>\\n\\nFollow-up: <links>"',
              '```'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });

  question-answer-sync-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Ensure answer PRs update agent guidance artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const issueNumbers = [...body.matchAll(/\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)\b/gi)]
              .map((match) => parseInt(match[1], 10))
              .filter((num) => Number.isInteger(num));

            if (issueNumbers.length === 0) {
              core.info('PR does not close any issue; question sync check skipped.');
              return;
            }

            const uniqueNumbers = [...new Set(issueNumbers)];
            const linkedIssues = await Promise.all(uniqueNumbers.map(async (issue_number) => {
              try {
                const { data } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number
                });
                return data;
              } catch (error) {
                core.warning(`Unable to read linked issue #${issue_number}: ${error.message}`);
                return null;
              }
            }));

            const questionIssues = linkedIssues.filter((issue) => {
              if (!issue || issue.pull_request) return false;
              const labels = (issue.labels || []).map((label) => typeof label === 'string' ? label : label.name);
              return labels.includes('Question') || labels.includes('#question');
            });

            if (questionIssues.length === 0) {
              core.info('No linked Question issues found.');
              return;
            }

            const prLabels = (pr.labels || []).map((l) => typeof l === 'string' ? l : l.name);
            if (prLabels.includes('no-guidance-update')) {
              core.info('PR carries "no-guidance-update" label — author confirmed no operating-guidance change needed. Skipping file check.');
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });
            const changedPaths = new Set(files.map((file) => file.filename));
            const guidanceFiles = ['AGENTS.md', '.agentic/skills.yml'];
            const missing = guidanceFiles.filter((path) => !changedPaths.has(path));

            if (missing.length > 0) {
              core.warning(`PR closes Question issue(s) ${questionIssues.map((issue) => `#${issue.number}`).join(', ')} without updating ${missing.join(', ')}. Per AGENTS.md, update these files when the answer changes operating guidance, or add the "no-guidance-update" label if it does not.`);
              return;
            }

            core.info(`Question issue sync check passed for ${questionIssues.map((issue) => `#${issue.number}`).join(', ')}.`);
